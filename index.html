<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <img src="assets/img/logo.png" alt="logo" class="w-10 h-10">
            </div>
            <div class="flex-none">
                <ul class="menu menu-horizontal px-1">
                    <li><a href="allproducts.html" class="bg-transparent hover:bg-transparent border-none">All Products</a></li>
                </ul>
            </div>
        </div>
    </header>
    <main>
        <section class=" hero ">
            <div class="hero min-h-screen" style="background-image: url(assets/img/hero.png);">
                <div class="hero-content text-neutral-content text-start w-full justify-start">
                    <div class="max-w-md">
                        <h1 class="mb-5 text-5xl font-bold">Welcome to Our Store</h1>
                        <p class="mb-5">
                            Discover a curated collection of high-quality products designed to elevate your everyday
                            life.
                        </p>
                        <a href="#categories" class="btn bg-primary-light">browse categories</a>
                    </div>
                </div>
            </div>
        </section>
        <section class="categories-section py-20" id="categories">
            <div class="text-center mb-12">
                <h2 class="text-4xl font-extrabold text-base-content tracking-tight">Categories</h2>
                <p class="text-base-content/70 mt-3 text-lg">Browse our most popular product categories</p>
            </div>
            <div class="categories-container max-w-7xl mx-auto gap-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 px-5">
                

            </div>

        </section>
    </main>

    <footer class="footer sm:footer-horizontal bg-neutral text-neutral-content p-10">
        <aside>
            <img src="assets/img/logo-light.png" alt="logo" class="w-10 h-10">
            <p class="text-white text-xl  font-bold">
                Reload
                <br />
                Everything you need in one place
            </p>
        </aside>
        <nav>
            <h6 class="footer-title">Social</h6>
            <div class="grid grid-flow-col gap-4">
                <a>
                    <i class="fa-brands fa-instagram" style="color: rgb(255, 255, 255);"></i> </a>
                <a>
                    <i class="fa-brands fa-tiktok" style="color: rgb(255, 255, 255);"></i>
                </a>
                <a>
                    <i class="fa-brands fa-facebook" style="color: rgb(255, 255, 255);"></i>
                </a>
            </div>
        </nav>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/index.js"></script>
</body>
</html>
